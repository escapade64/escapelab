<!DOCTYPE html>
<html>
<head>
    <title>Éditeur de destinations</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #container { display: flex; height: 100vh; }
        #map { flex: 2; height: 100%; }
        #form { flex: 1; padding: 20px; overflow-y: auto; }
        #destination-list { margin-top: 20px; }
        .destination-item { padding: 10px; border: 1px solid #ccc; margin-bottom: 10px; cursor: pointer; }
        .activities-list { margin-top: 10px; }
        .activity-item { display: flex; justify-content: space-between; padding: 5px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="map"></div>
        <div id="form">
            <h2>Éditeur de destinations</h2>
            <div>
                <label for="destination-name">Nom :</label>
                <input type="text" id="destination-name" placeholder="Ex: Paris">
            </div>
            <div>
                <label for="destination-lat">Latitude :</label>
                <input type="text" id="destination-lat" placeholder="Ex: 48.8566">
            </div>
            <div>
                <label for="destination-lng">Longitude :</label>
                <input type="text" id="destination-lng" placeholder="Ex: 2.3522">
            </div>
            <div>
                <label for="activity-input">Activité :</label>
                <input type="text" id="activity-input" placeholder="Ex: Visite culturelle">
                <button id="add-activity">Ajouter</button>
            </div>
            <div class="activities-list" id="activities-list"></div>
            <button id="save-destination">Enregistrer</button>
            <div id="destination-list"></div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="scripts/carte.js"></script>
</body>
</html>
